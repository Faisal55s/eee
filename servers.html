<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المودات - لوحة التحكم</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-free { background: rgba(74, 222, 128, 0.2); color: var(--success-color); }
        .badge-paid { background: rgba(255, 107, 53, 0.2); color: var(--primary-color); }
        .text-center { text-align: center; }
        .text-error { color: var(--danger-color); }
    </style>
</head>
<body class="admin-body">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <div class="admin-logo">ارموكس</div>
        <nav class="admin-nav">
            <a href="index.html" class="admin-nav-item">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </a>
            <a href="servers.html" class="admin-nav-item">
                <i class="fas fa-server"></i>
                <span>السيرفرات</span>
            </a>
            <a href="mods.html" class="admin-nav-item active">
                <i class="fas fa-cube"></i>
                <span>المودات</span>
            </a>
            <a href="suggestions.html" class="admin-nav-item">
                <i class="fas fa-envelope"></i>
                <span>الرسائل</span>
            </a>
            <a href="#" class="admin-nav-item" onclick="logout(); return false;">
                <i class="fas fa-sign-out-alt"></i>
                <span>تسجيل الخروج</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
        <div class="admin-header">
            <h1 class="admin-title">إدارة المودات</h1>
            <button class="btn btn-primary" onclick="openModal('mod-modal'); document.getElementById('mod-form').reset(); document.getElementById('mod-id').value = '';">
                <i class="fas fa-plus"></i> إضافة مود
            </button>
        </div>

        <!-- Mods Table -->
        <div class="data-table">
            <table id="mods-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الاسم</th>
                        <th>الفئة</th>
                        <th>النوع</th>
                        <th>السعر</th>
                        <th>التحميلات</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="7" class="text-center">جاري التحميل...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Mod Modal -->
    <div class="modal-overlay" id="mod-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">إضافة/تعديل مود</h3>
                <button class="modal-close" onclick="closeModal('mod-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="mod-form">
                    <input type="hidden" id="mod-id">
                    <div class="form-group">
                        <label class="form-label">اسم المود</label>
                        <input type="text" id="mod-name" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">الوصف</label>
                        <textarea id="mod-description" class="form-textarea" rows="3"></textarea>
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label">الفئة</label>
                            <select id="mod-category" class="form-select">
                                <option value="vehicle">سيارات</option>
                                <option value="map">خرائط</option>
                                <option value="script">سكربتات</option>
                                <option value="skin">سكنات</option>
                                <option value="weapon">أسلحة</option>
                                <option value="misc">أخرى</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">النوع</label>
                            <select id="mod-type" class="form-select">
                                <option value="free">مجاني</option>
                                <option value="paid">مدفوع</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">السعر ($)</label>
                            <input type="number" id="mod-price" class="form-input" value="0" step="0.01">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">رابط التحميل</label>
                        <input type="url" id="mod-download" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">رابط الصورة</label>
                        <input type="url" id="mod-preview" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">الناشر</label>
                        <input type="text" id="mod-author" class="form-input">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('mod-modal')">إلغاء</button>
                <button class="btn btn-primary" onclick="saveMod()">حفظ</button>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
