<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - ارموكس</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-online { background: rgba(74, 222, 128, 0.2); color: var(--success-color); }
        .badge-offline { background: rgba(239, 68, 68, 0.2); color: var(--danger-color); }
        .badge-esx { background: rgba(16, 185, 129, 0.2); color: var(--esx-color); }
        .badge-vrp { background: rgba(139, 92, 246, 0.2); color: var(--vrp-color); }
        .badge-cfx { background: rgba(59, 130, 246, 0.2); color: var(--cfx-color); }
        .badge-free { background: rgba(74, 222, 128, 0.2); color: var(--success-color); }
        .badge-paid { background: rgba(255, 107, 53, 0.2); color: var(--primary-color); }
        .badge-new { background: rgba(59, 130, 246, 0.2); color: var(--info-color); }
        .badge-read { background: rgba(251, 191, 36, 0.2); color: var(--warning-color); }
        .badge-replied { background: rgba(74, 222, 128, 0.2); color: var(--success-color); }
        .badge-closed { background: rgba(107, 114, 128, 0.2); color: var(--text-secondary); }
        .text-center { text-align: center; }
        .text-error { color: var(--danger-color); }
    </style>
</head>
<body class="admin-body">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <div class="admin-logo">ارموكس</div>
        <nav class="admin-nav">
            <a href="index.html" class="admin-nav-item active">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </a>
            <a href="servers.html" class="admin-nav-item">
                <i class="fas fa-server"></i>
                <span>السيرفرات</span>
            </a>
            <a href="mods.html" class="admin-nav-item">
                <i class="fas fa-cube"></i>
                <span>المودات</span>
            </a>
            <a href="suggestions.html" class="admin-nav-item">
                <i class="fas fa-envelope"></i>
                <span>الرسائل</span>
            </a>
            <a href="#" class="admin-nav-item" onclick="logout(); return false;">
                <i class="fas fa-sign-out-alt"></i>
                <span>تسجيل الخروج</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
        <div class="admin-header">
            <h1 class="admin-title">لوحة التحكم</h1>
            <div>
                <span style="color: var(--text-secondary);">مرحباً، </span>
                <span style="font-weight: 600;">المسؤول</span>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-card-header">
                    <span class="stat-card-title">إجمالي السيرفرات</span>
                    <div class="stat-card-icon">
                        <i class="fas fa-server"></i>
                    </div>
                </div>
                <div class="stat-card-value" id="admin-total-servers">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-header">
                    <span class="stat-card-title">السيرفرات المتصلة</span>
                    <div class="stat-card-icon" style="background: rgba(74, 222, 128, 0.1); color: var(--success-color);">
                        <i class="fas fa-circle"></i>
                    </div>
                </div>
                <div class="stat-card-value" id="admin-online-servers" style="color: var(--success-color);">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-header">
                    <span class="stat-card-title">اللاعبين النشطين</span>
                    <div class="stat-card-icon" style="background: rgba(59, 130, 246, 0.1); color: var(--info-color);">
                        <i class="fas fa-users"></i>
                    </div>
                </div>
                <div class="stat-card-value" id="admin-total-players" style="color: var(--info-color);">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-header">
                    <span class="stat-card-title">إجمالي المودات</span>
                    <div class="stat-card-icon" style="background: rgba(139, 92, 246, 0.1); color: var(--vrp-color);">
                        <i class="fas fa-cube"></i>
                    </div>
                </div>
                <div class="stat-card-value" id="admin-total-mods" style="color: var(--vrp-color);">0</div>
            </div>
        </div>

        <!-- Recent Servers -->
        <div class="admin-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 style="font-size: 1.25rem; font-weight: 700;">أحدث السيرفرات</h2>
                <a href="servers.html" class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.875rem;">
                    <i class="fas fa-plus"></i> إضافة سيرفر
                </a>
            </div>
            
            <div class="data-table">
                <table id="servers-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>الاسم</th>
                            <th>النوع</th>
                            <th>الحالة</th>
                            <th>اللاعبين</th>
                            <th>التقييم</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="7" class="text-center">جاري التحميل...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Server Modal -->
    <div class="modal-overlay" id="server-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">إضافة/تعديل سيرفر</h3>
                <button class="modal-close" onclick="closeModal('server-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="server-form">
                    <input type="hidden" id="server-id">
                    <div class="form-group">
                        <label class="form-label">اسم السيرفر</label>
                        <input type="text" id="server-name" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">الوصف</label>
                        <textarea id="server-description" class="form-textarea" rows="3"></textarea>
                    </div>
                    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label">عنوان IP</label>
                            <input type="text" id="server-ip" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">المنفذ</label>
                            <input type="number" id="server-port" class="form-input" value="30120">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">رابط الديسكورد</label>
                        <input type="url" id="server-discord" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">الموقع الإلكتروني</label>
                        <input type="url" id="server-website" class="form-input">
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label">النوع</label>
                            <select id="server-type" class="form-select">
                                <option value="esx">ESX</option>
                                <option value="vrp">VRP</option>
                                <option value="cfx">CFX</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">الفئة</label>
                            <input type="text" id="server-category" class="form-input" placeholder="RP, Racing, etc.">
                        </div>
                        <div class="form-group">
                            <label class="form-label">الحد الأقصى للاعبين</label>
                            <input type="number" id="server-max-players" class="form-input" value="64">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">الحالة</label>
                        <select id="server-status" class="form-select">
                            <option value="online">متصل</option>
                            <option value="offline">غير متصل</option>
                            <option value="maintenance">صيانة</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('server-modal')">إلغاء</button>
                <button class="btn btn-primary" onclick="saveServer()">حفظ</button>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
